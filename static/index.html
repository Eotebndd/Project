<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰坦尼克号数据探索Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .action-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn-summary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-visualize {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
        }
        
        .btn-train {
            background: linear-gradient(135deg, #4776E6 0%, #8E54E9 100%);
            color: white;
        }
        
        .btn-icon {
            font-size: 1.5em;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            max-width: 90%;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .message.assistant {
            background: white;
            border: 1px solid #e0e0e0;
        }
        
        .message pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result-section {
            margin-top: 20px;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .result-content {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .image-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        
        .image-gallery img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-bar {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚢 泰坦尼克号数据探索Agent</h1>
            <p>基于LangChain的智能数据分析助手 | 支持自然语言交互</p>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h2>⚡ 快捷功能</h2>
                <div class="quick-actions">
                    <button class="action-btn btn-summary" onclick="executeFunction('summary')">
                        <span class="btn-icon">📊</span>
                        <div>
                            <div>数据摘要统计</div>
                            <small>查看均值、方差、最大最小值等</small>
                        </div>
                    </button>
                    
                    <button class="action-btn btn-visualize" onclick="executeFunction('visualize')">
                        <span class="btn-icon">📈</span>
                        <div>
                            <div>数据可视化</div>
                            <small>绘制Survived列分布图</small>
                        </div>
                    </button>
                    
                    <button class="action-btn btn-train" onclick="executeFunction('train')">
                        <span class="btn-icon">🤖</span>
                        <div>
                            <div>模型训练预测</div>
                            <small>训练RandomForest预测生存率</small>
                        </div>
                    </button>
                </div>
            </div>
            
            <div class="card">
                <h2>💬 智能对话</h2>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message assistant">
                            <pre>你好！我是泰坦尼克号数据分析助手。你可以：
1. 点击左侧快捷按钮执行常用功能
2. 直接输入问题与我对话

例如：
- "请给我数据的统计摘要"
- "画出Survived列的分布"
- "训练一个模型预测Survived"</pre>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="userInput" 
                               placeholder="输入你的问题..." 
                               onkeypress="if(event.key==='Enter')sendMessage()">
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="result-section" id="resultSection" style="display: none;">
            <div class="result-card">
                <h2>📋 执行结果</h2>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Agent正在处理中...</p>
                </div>
                <div class="result-content" id="resultContent"></div>
                <div class="image-gallery" id="imageGallery"></div>
            </div>
        </div>
        
        <div class="status-bar" id="statusBar">
            就绪 | 模型: <span id="modelInfo">未连接</span>
        </div>
    </div>

    <script>
        let sessionId = null;
        
        async function executeFunction(type) {
            showLoading(true);
            document.getElementById('resultSection').style.display = 'block';
            
            try {
                const response = await fetch(`/api/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await response.json();
                
                document.getElementById('resultContent').textContent = data.result;
                
                if (data.image_paths && data.image_paths.length > 0) {
                    const gallery = document.getElementById('imageGallery');
                    gallery.innerHTML = data.image_paths.map(path => 
                        `<img src="${path}" alt="图表">`
                    ).join('');
                }
                
                addMessage('assistant', data.result);
            } catch (error) {
                document.getElementById('resultContent').textContent = '错误: ' + error.message;
            }
            
            showLoading(false);
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            input.value = '';
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            showLoading(true);
            document.getElementById('resultSection').style.display = 'block';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                sessionId = data.session_id;
                
                document.getElementById('resultContent').textContent = data.response;
                
                if (data.image_paths && data.image_paths.length > 0) {
                    const gallery = document.getElementById('imageGallery');
                    gallery.innerHTML = data.image_paths.map(path => 
                        `<img src="${path}" alt="图表">`
                    ).join('');
                }
                
                addMessage('assistant', data.response);
            } catch (error) {
                addMessage('assistant', '错误: ' + error.message);
                document.getElementById('resultContent').textContent = '错误: ' + error.message;
            }
            
            sendBtn.disabled = false;
            showLoading(false);
        }
        
        function addMessage(role, content) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<pre>${escapeHtml(content)}</pre>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }
        
        async function checkStatus() {
            try {
                const response = await fetch('/api/summary', {method: 'POST'});
                document.getElementById('modelInfo').textContent = '已连接';
            } catch {
                document.getElementById('modelInfo').textContent = '服务运行中';
            }
        }
        
        checkStatus();
    </script>
</body>
</html>
