<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7f7f8;
            min-height: 100vh;
            color: #374151;
        }
        
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        
        .welcome-screen.hidden {
            display: none;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #111827;
        }
        
        .welcome-subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 40px;
        }
        
        .upload-area {
            width: 100%;
            max-width: 600px;
            background: white;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #10a37f;
            background: #f0fdf4;
        }
        
        .upload-area.has-file {
            border-color: #10a37f;
            background: #f0fdf4;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 16px;
            color: #6b7280;
        }
        
        .file-info {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 8px;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-weight: 600;
            color: #059669;
        }
        
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            max-width: 700px;
        }
        
        .quick-question {
            padding: 12px 18px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quick-question:hover {
            background: #f3f4f6;
            border-color: #10a37f;
        }
        
        .chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .chat-screen.active {
            display: flex;
        }
        
        .chat-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .new-chat-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .new-chat-btn:hover {
            background: #e5e7eb;
        }
        
        .data-info {
            font-size: 13px;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .data-badge {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            gap: 16px;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .user .message-avatar {
            background: #5436da;
        }
        
        .assistant .message-avatar {
            background: #10a37f;
        }
        
        .message-content {
            flex: 1;
            padding-top: 6px;
        }
        
        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .thinking-section {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .thinking-header {
            background: #f9fafb;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
        }
        
        .thinking-header:hover {
            background: #f3f4f6;
        }
        
        .thinking-arrow {
            transition: transform 0.2s;
        }
        
        .thinking-arrow.open {
            transform: rotate(180deg);
        }
        
        .thinking-content {
            display: none;
            padding: 14px;
            background: #fefce8;
            font-size: 13px;
            color: #713f12;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .thinking-content.show {
            display: block;
        }
        
        .message-images {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .message-images img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .message-images img:hover {
            transform: scale(1.02);
        }
        
        .chat-input-area {
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 20px;
        }
        
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-wrapper {
            flex: 1;
            background: #f3f4f6;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }
        
        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            max-height: 150px;
            outline: none;
            font-family: inherit;
        }
        
        .send-btn {
            width: 36px;
            height: 36px;
            background: #10a37f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .send-btn:hover:not(:disabled) {
            background: #059669;
        }
        
        .send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        
        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        
        .image-modal.show {
            display: flex;
        }
        
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 24px;
            }
            
            .quick-questions {
                flex-direction: column;
            }
            
            .message {
                gap: 10px;
            }
            
            .message-avatar {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-screen" id="welcomeScreen">
        <div class="logo">📊</div>
        <h1 class="welcome-title">Data Explorer Agent</h1>
        <p class="welcome-subtitle">上传CSV文件，用自然语言探索你的数据</p>
        
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传CSV文件</div>
            <div class="file-info" id="fileInfo">
                <span class="file-name" id="fileName"></span>
                <span id="fileStats"></span>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".csv" style="display:none">
        
        <div class="quick-questions">
            <div class="quick-question" onclick="setQuestion('给我数据的统计摘要')">📊 数据摘要统计</div>
            <div class="quick-question" onclick="setQuestion('画出各列的分布图')">📈 数据可视化</div>
            <div class="quick-question" onclick="setQuestion('训练模型预测目标变量')">🤖 模型训练</div>
            <div class="quick-question" onclick="setQuestion('分析数据的相关性')">🔗 相关性分析</div>
        </div>
        
        <div style="margin-top: 30px; width: 100%; max-width: 600px;">
            <div class="input-wrapper" style="background: white; border: 1px solid #e5e7eb;">
                <textarea id="welcomeInput" rows="1" placeholder="输入你的问题..." 
                          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();startChat()}"></textarea>
                <button class="send-btn" id="startBtn" onclick="startChat()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <div class="chat-screen" id="chatScreen">
        <div class="chat-header">
            <div class="header-left">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span> 新对话
                </button>
                <div class="data-info">
                    <span class="data-badge" id="dataBadge">未上传数据</span>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="chat-input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="chatInput" rows="1" placeholder="输入你的问题..." 
                              onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="放大图片">
    </div>

    <script>
        let sessionId = null;
        let uploadedFile = null;
        
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        
        fileInput.addEventListener('change', handleFileSelect);
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#10a37f';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#d1d5db';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#d1d5db';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.csv')) {
                handleFile(file);
            }
        });
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        async function handleFile(file) {
            uploadedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileInfo').classList.add('show');
            uploadArea.classList.add('has-file');
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    sessionId = data.session_id;
                    document.getElementById('fileStats').textContent = 
                        ` · ${data.rows} 行 · ${data.columns.length} 列`;
                } else {
                    alert('上传失败: ' + data.detail);
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }
        
        function setQuestion(question) {
            document.getElementById('welcomeInput').value = question;
        }
        
        async function startChat() {
            const input = document.getElementById('welcomeInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('active');
            
            if (uploadedFile) {
                document.getElementById('dataBadge').textContent = uploadedFile.name;
            }
            
            addMessage('user', message);
            input.value = '';
            
            await processMessage(message);
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            await processMessage(message);
        }
        
        async function processMessage(message) {
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            document.getElementById('chatMessages').appendChild(loadingDiv);
            scrollToBottom();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                loadingDiv.remove();
                
                if (response.ok) {
                    addMessage('assistant', data.response, data.thinking, data.image_paths);
                } else {
                    addMessage('assistant', `错误: ${data.detail}`, '', []);
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('assistant', `请求失败: ${error.message}`, '', []);
            }
            
            sendBtn.disabled = false;
        }
        
        function addMessage(role, content, thinking = '', imagePaths = []) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🤖';
            
            let thinkingHtml = '';
            if (thinking) {
                thinkingHtml = `
                    <div class="thinking-section">
                        <div class="thinking-header" onclick="toggleThinking(this)">
                            <span>💭 思考过程</span>
                            <span class="thinking-arrow">▼</span>
                        </div>
                        <div class="thinking-content">${escapeHtml(thinking)}</div>
                    </div>
                `;
            }
            
            let imagesHtml = '';
            if (imagePaths && imagePaths.length > 0) {
                imagesHtml = `<div class="message-images">
                    ${imagePaths.map(path => `<img src="${path}" onclick="showImageModal('${path}')" alt="图表">`).join('')}
                </div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-text">${escapeHtml(content)}</div>
                    ${thinkingHtml}
                    ${imagesHtml}
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function toggleThinking(header) {
            const content = header.nextElementSibling;
            const arrow = header.querySelector('.thinking-arrow');
            content.classList.toggle('show');
            arrow.classList.toggle('open');
        }
        
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }
        
        function newChat() {
            sessionId = null;
            uploadedFile = null;
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('fileInfo').classList.remove('show');
            uploadArea.classList.remove('has-file');
            document.getElementById('dataBadge').textContent = '未上传数据';
            document.getElementById('welcomeInput').value = '';
        }
        
        const textarea = document.getElementById('chatInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
