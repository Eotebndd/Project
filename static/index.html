<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7f7f8;
            min-height: 100vh;
            color: #374151;
        }
        
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        
        .welcome-screen.hidden {
            display: none;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #111827;
        }
        
        .welcome-subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 40px;
        }
        
        .upload-area {
            width: 100%;
            max-width: 600px;
            background: white;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #10a37f;
            background: #f0fdf4;
        }
        
        .upload-area.has-file {
            border-color: #10a37f;
            background: #f0fdf4;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            font-size: 16px;
            color: #6b7280;
        }
        
        .file-info {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 8px;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-weight: 600;
            color: #059669;
        }
        
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            max-width: 700px;
        }
        
        .quick-question {
            padding: 12px 18px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .quick-question:hover {
            background: #f3f4f6;
            border-color: #10a37f;
        }
        
        .chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        
        .chat-screen.active {
            display: flex;
        }
        
        .chat-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .new-chat-btn {
            padding: 8px 16px;
            background: #f3f4f6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .new-chat-btn:hover {
            background: #e5e7eb;
        }
        
        .data-info {
            font-size: 13px;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .data-badge {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            gap: 16px;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .user .message-avatar {
            background: #5436da;
        }
        
        .assistant .message-avatar {
            background: #10a37f;
        }
        
        .message-content {
            flex: 1;
            padding-top: 6px;
        }
        
        .message-text {
            line-height: 1.7;
        }
        
        .message-text h1, .message-text h2, .message-text h3 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #111827;
        }
        
        .message-text h1 { font-size: 1.5em; }
        .message-text h2 { font-size: 1.3em; }
        .message-text h3 { font-size: 1.1em; }
        
        .message-text p {
            margin-bottom: 12px;
        }
        
        .message-text ul, .message-text ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        
        .message-text li {
            margin-bottom: 4px;
        }
        
        .message-text strong {
            font-weight: 600;
            color: #111827;
        }
        
        .message-text em {
            font-style: italic;
            color: #6b7280;
        }
        
        .message-text code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }
        
        .message-text pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 12px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .message-text pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        
        .message-text table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .message-text th, .message-text td {
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
            text-align: left;
        }
        
        .message-text th {
            background: #f9fafb;
            font-weight: 600;
        }
        
        .message-text tr:nth-child(even) {
            background: #f9fafb;
        }
        
        .message-text blockquote {
            border-left: 4px solid #10a37f;
            padding-left: 16px;
            margin: 12px 0;
            color: #6b7280;
        }
        
        .message-text hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 16px 0;
        }
        
        .thinking-bubble {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #92400e;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .thinking-bubble.hidden {
            display: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .thinking-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .thinking-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #fcd34d;
            border-top-color: #92400e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .thinking-content {
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .message-images {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .message-images img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .message-images img:hover {
            transform: scale(1.02);
        }
        
        .chat-input-area {
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 20px;
        }
        
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-wrapper {
            flex: 1;
            background: #f3f4f6;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }
        
        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            max-height: 150px;
            outline: none;
            font-family: inherit;
        }
        
        .send-btn {
            width: 36px;
            height: 36px;
            background: #10a37f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .send-btn:hover:not(:disabled) {
            background: #059669;
        }
        
        .send-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        
        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        
        .image-modal.show {
            display: flex;
        }
        
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            .welcome-title {
                font-size: 24px;
            }
            
            .quick-questions {
                flex-direction: column;
            }
            
            .message {
                gap: 10px;
            }
            
            .message-avatar {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-screen" id="welcomeScreen">
        <div class="logo">📊</div>
        <h1 class="welcome-title">Data Explorer Agent</h1>
        <p class="welcome-subtitle">上传CSV文件，用自然语言探索你的数据</p>
        
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传CSV文件</div>
            <div class="file-info" id="fileInfo">
                <span class="file-name" id="fileName"></span>
                <span id="fileStats"></span>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".csv" style="display:none">
        
        <div class="quick-questions">
            <div class="quick-question" onclick="setQuestion('给我数据的统计摘要')">📊 数据摘要统计</div>
            <div class="quick-question" onclick="setQuestion('画出各列的分布图')">📈 数据可视化</div>
            <div class="quick-question" onclick="setQuestion('训练模型预测目标变量')">🤖 模型训练</div>
            <div class="quick-question" onclick="setQuestion('分析数据的相关性')">🔗 相关性分析</div>
        </div>
        
        <div style="margin-top: 30px; width: 100%; max-width: 600px;">
            <div class="input-wrapper" style="background: white; border: 1px solid #e5e7eb;">
                <textarea id="welcomeInput" rows="1" placeholder="输入你的问题..." 
                          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();startChat()}"></textarea>
                <button class="send-btn" id="startBtn" onclick="startChat()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
    
    <div class="chat-screen" id="chatScreen">
        <div class="chat-header">
            <div class="header-left">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span> 新对话
                </button>
                <div class="data-info">
                    <span class="data-badge" id="dataBadge">未上传数据</span>
                </div>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="chat-input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="chatInput" rows="1" placeholder="输入你的问题..." 
                              onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <img id="modalImage" src="" alt="放大图片">
    </div>

    <script>
        let sessionId = null;
        let uploadedFile = null;
        
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        
        fileInput.addEventListener('change', handleFileSelect);
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#10a37f';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#d1d5db';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#d1d5db';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.csv')) {
                handleFile(file);
            }
        });
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }
        
        async function handleFile(file) {
            uploadedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileInfo').classList.add('show');
            uploadArea.classList.add('has-file');
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    sessionId = data.session_id;
                    document.getElementById('fileStats').textContent = 
                        ` · ${data.rows} 行 · ${data.columns.length} 列`;
                } else {
                    alert('上传失败: ' + data.detail);
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        }
        
        function setQuestion(question) {
            document.getElementById('welcomeInput').value = question;
        }
        
        async function startChat() {
            const input = document.getElementById('welcomeInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.add('active');
            
            if (uploadedFile) {
                document.getElementById('dataBadge').textContent = uploadedFile.name;
            }
            
            addMessage('user', message);
            input.value = '';
            
            await processMessageStream(message);
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            await processMessageStream(message);
        }
        
        async function processMessageStream(message) {
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            const thinkingId = 'thinking-' + Date.now();
            addThinkingBubble(thinkingId);
            
            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.type === 'thinking') {
                                updateThinkingBubble(thinkingId, data.content);
                            } else if (data.type === 'done') {
                                removeThinkingBubble(thinkingId);
                                addMessage('assistant', data.content, data.image_paths);
                            } else if (data.type === 'error') {
                                removeThinkingBubble(thinkingId);
                                addMessage('assistant', `错误: ${data.content}`, []);
                            }
                        }
                    }
                }
            } catch (error) {
                removeThinkingBubble(thinkingId);
                addMessage('assistant', `请求失败: ${error.message}`, []);
            }
            
            sendBtn.disabled = false;
        }
        
        function addThinkingBubble(id) {
            const messagesDiv = document.getElementById('chatMessages');
            const bubble = document.createElement('div');
            bubble.id = id;
            bubble.className = 'message assistant';
            bubble.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="thinking-bubble">
                        <div class="thinking-title">
                            <div class="thinking-spinner"></div>
                            <span>正在思考...</span>
                        </div>
                        <div class="thinking-content" id="${id}-content"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(bubble);
            scrollToBottom();
        }
        
        function updateThinkingBubble(id, content) {
            const contentDiv = document.getElementById(id + '-content');
            if (contentDiv) {
                contentDiv.textContent = content;
            }
            scrollToBottom();
        }
        
        function removeThinkingBubble(id) {
            const bubble = document.getElementById(id);
            if (bubble) {
                bubble.remove();
            }
        }
        
        function parseMarkdown(text) {
            if (!text) return '';
            
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            text = text.replace(/^---$/gm, '<hr>');
            
            const tableRegex = /^\|(.+)\|\s*\n\|[-:\s|]+\|\s*\n((?:\|.+\|\s*\n?)+)/gm;
            text = text.replace(tableRegex, (match, header, body) => {
                const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const cells = row.replace(/^\||\|$/g, '').split('|').map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');
                return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
            });
            
            text = text.replace(/\n\n/g, '</p><p>');
            text = text.replace(/\n/g, '<br>');
            
            text = text.replace(/=== (.+?) ===/g, '<h2>$1</h2>');
            text = text.replace(/【(.+?)】/g, '<strong>【$1】</strong>');
            
            return '<p>' + text + '</p>';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addMessage(role, content, imagePaths = []) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🤖';
            
            let imagesHtml = '';
            if (imagePaths && imagePaths.length > 0) {
                imagesHtml = `<div class="message-images">
                    ${imagePaths.map(path => `<img src="${path}" onclick="showImageModal('${path}')" alt="图表">`).join('')}
                </div>`;
            }
            
            const formattedContent = role === 'assistant' ? parseMarkdown(content) : escapeHtml(content);
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    ${imagesHtml}
                    <div class="message-text">${formattedContent}</div>
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('show');
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }
        
        function newChat() {
            sessionId = null;
            uploadedFile = null;
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('fileInfo').classList.remove('show');
            uploadArea.classList.remove('has-file');
            document.getElementById('dataBadge').textContent = '未上传数据';
            document.getElementById('welcomeInput').value = '';
        }
        
        const textarea = document.getElementById('chatInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
